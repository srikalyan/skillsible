name: Delete Merged Branch

on:
  pull_request:
    types:
      - closed

jobs:
  delete-branch:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref != github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete merged branch
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/heads/${BRANCH_NAME}" >/dev/null 2>&1; then
            gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/${BRANCH_NAME}"
          else
            echo "Branch '${BRANCH_NAME}' is already deleted; nothing to do."
          fi
