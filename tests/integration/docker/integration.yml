version: 1

agents:
  - codex

defaults:
  scope: global

skills:
  - source: /workspace/tests/integration/fixtures/demo-skills
    skill: writing-clearly-and-concisely

tools:
  - name: pyright
    kind: lsp
    source:
      npm:
        package: pyright
    verify:
      command: pyright
      args:
        - --version

  - name: ruff
    kind: cli
    source:
      uv:
        package: ruff
    verify:
      command: ruff
      args:
        - --version

mcps:
  - name: github
    transport: stdio
    command: github-mcp
    args:
      - --serve
