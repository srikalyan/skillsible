# Minimal skills-only example:
#
# version: 1
# agents:
#   - codex
#   - claude-code
# skills:
#   - source: googleworkspace/cli
#     skill: gws-drive
#
# Full layered example below:

version: 1

agents:
  - codex
  - claude-code

defaults:
  scope: global

skills:
  - source: googleworkspace/cli
    skill: gws-drive
    agents:
      - codex
      - claude-code

tools:
  - name: gws
    kind: cli
    source:
      npm:
        package: "@googleworkspace/cli"
    verify:
      command: gws
      args:
        - --help
    agents:
      - codex
      - claude-code

mcps:
  - name: workspace-developer
    transport: http
    url: https://workspace-developer.goog/mcp
    agents:
      - claude-code
