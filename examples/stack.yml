version: 1

agents:
  - codex
  - claude-code

defaults:
  scope: global

skills:
  - source: obra/the-elements-of-style
    skill: writing-clearly-and-concisely
    version: v1.2.0

tools:
  - name: pyright
    kind: lsp
    source:
      npm:
        package: pyright
    verify:
      command: pyright
      args:
        - --version

  - name: ruff
    kind: cli
    source:
      uv:
        package: ruff
    verify:
      command: ruff
      args:
        - --version

mcps:
  - name: github
    transport: stdio
    command: github-mcp
    agents:
      - claude-code

  - name: linear
    transport: http
    url: http://localhost:8765/mcp
    agents:
      - claude-code
